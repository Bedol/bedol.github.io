<!DOCTYPE html>
<html>
{% include head.html %}
<body>
  <header class="site-header default-header">
    <div class="wrapper" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 2rem;">
      <a class="site-title" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>
      <nav class="site-nav">
        <a href="{{ "/" | relative_url }}" class="nav-link">Home</a>
        <a href="{{ "/posts" | relative_url }}" class="nav-link">Blog</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    {{ content }}
  </main>
</body>
</html>
